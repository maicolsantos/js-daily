<!DOCTYPE html>
<html>
<script>
function deepEqual(a, b) {
  if (a === b) return true;
  if (a === null || b === null) return a === b;
  if (typeof a !== typeof b) return false;
  if (typeof a !== 'object') return a === b;
  if (Array.isArray(a) !== Array.isArray(b)) return false;
  var keysA = Object.keys(a);
  var keysB = Object.keys(b);
  if (keysA.length !== keysB.length) return false;
  for (var i = 0; i < keysA.length; i++) {
    if (!deepEqual(a[keysA[i]], b[keysA[i]])) return false;
  }
  return true;
}

function parseLeetCodeInput(raw) {
  // "nums = [1,2], target = 9" -> [[1,2], 9]
  // If it looks like a plain value (no "name ="), wrap and parse directly
  if (typeof raw !== 'string') return [raw];
  var trimmed = raw.trim();
  // Split on ", <word> =" boundaries
  var parts = trimmed.split(/,\s*(?=[a-zA-Z_]\w*\s*=)/);
  if (parts.length === 1 && !/^\w+\s*=/.test(trimmed)) {
    // No named params — try parse as single value
    try { return [JSON.parse(trimmed)]; } catch(e) { return [trimmed]; }
  }
  return parts.map(function(p) {
    var eq = p.indexOf('=');
    var val = eq >= 0 ? p.slice(eq + 1).trim() : p.trim();
    try { return JSON.parse(val); } catch(e) { return val; }
  });
}

function parseLeetCodeExpected(raw) {
  if (typeof raw !== 'string') return raw;
  try { return JSON.parse(raw.trim()); } catch(e) { return raw.trim(); }
}

function runTests(userCode, testCases) {
  var topLevelNames = [];
  var re1 = /^(?:var|let|const)\s+(\w+)\s*=\s*function/mg;
  var re2 = /^function\s+(\w+)/mg;
  var _m;
  while ((_m = re1.exec(userCode)) !== null) topLevelNames.push({ name: _m[1], idx: _m.index });
  while ((_m = re2.exec(userCode)) !== null) topLevelNames.push({ name: _m[1], idx: _m.index });
  topLevelNames.sort(function(a, b) { return a.idx - b.idx; });
  if (topLevelNames.length === 0) throw new Error('No named function found at top level.');
  var fnName = topLevelNames[0].name;
  // new Function is allowed in sandbox pages (exempt from extension CSP)
  var wrapped = new Function(userCode + '\nreturn ' + fnName + ';');
  var userFn = wrapped();
  if (typeof userFn !== 'function') throw new Error('Could not extract function "' + fnName + '"');

  var results = [];
  for (var i = 0; i < testCases.length; i++) {
    var tc = testCases[i];
    try {
      var received;
      if (tc.input.length === 1 && tc.input[0] === '__COMPOSE_TEST_1__') {
        received = userFn(function(x) { return x + 1; }, function(x) { return x * 2; })(3);
      } else if (tc.input.length === 1 && tc.input[0] === '__COMPOSE_TEST_2__') {
        received = userFn(function(x) { return x.toUpperCase(); }, function(x) { return x.trim(); })('  hello  ');
      } else if (tc.expected === 'function') {
        var ret = userFn(function(x){ return x; }, tc.input[1] !== undefined ? tc.input[1] : 100);
        results.push({ passed: typeof ret === 'function', label: tc.label, input: tc.input, expected: tc.expected, received: typeof ret });
        continue;
      } else {
        var args = (tc.input.length === 1 && typeof tc.input[0] === 'string')
          ? parseLeetCodeInput(tc.input[0])
          : tc.input;
        received = userFn.apply(null, args);
      }
      var expected = parseLeetCodeExpected(tc.expected);
      results.push({ passed: deepEqual(received, expected), label: tc.label, input: tc.input, expected: expected, received: received });
    } catch(e) {
      results.push({ passed: false, label: tc.label, input: tc.input, expected: tc.expected, received: undefined, error: String(e.message) });
    }
  }
  return results;
}

window.addEventListener('message', function(e) {
  if (!e.data || e.data.type !== 'run') return;
  var userCode = e.data.userCode;
  var testCases = e.data.testCases;
  try {
    var results = runTests(userCode, testCases);
    parent.postMessage({ type: 'results', results: results }, '*');
  } catch(err) {
    parent.postMessage({ type: 'results', results: testCases.map(function(tc) {
      return { passed: false, label: tc.label, input: tc.input, expected: tc.expected, received: undefined, error: String(err.message) };
    })}, '*');
  }
});
</script>
</html>
